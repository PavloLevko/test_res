<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Meteor Game</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:black;
        font-family:Arial, sans-serif;
        cursor:none;
    }

    canvas{
        display:block;
        background:linear-gradient(to bottom,#000000,#050520);
    }

    #score{
        position:absolute;
        top:20px;
        left:20px;
        color:#ffe600;
        font-size:28px;
        font-weight:bold;
    }

    #gameOver{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        color:#ffe600;
        font-size:50px;
        display:none;
        text-align:center;
    }

    #restartBtn{
        margin-top:20px;
        padding:12px 25px;
        border:none;
        background:#ffe600;
        color:black;
        font-size:20px;
        border-radius:10px;
        cursor:pointer;
    }
</style>
</head>

<body>

<div id="score">Score: 0</div>

<div id="gameOver">
    GAME OVER
    <br>
    <button id="restartBtn">Restart</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameEnded = false;

const ship = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    width: 60,
    height: 60
};

const bullets = [];
const meteors = [];

const laserSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");
const boomSound = new Audio("https://assets.mixkit.co/active_storage/sfx/1018/1018-preview.mp3");

document.addEventListener("mousemove", (e) => {
    ship.x = e.clientX - ship.width / 2;
});

document.addEventListener("click", () => {
    if(gameEnded) return;

    bullets.push({
        x: ship.x + ship.width / 2 - 3,
        y: ship.y
    });

    laserSound.currentTime = 0;
    laserSound.play();
});

function createMeteor(){
    meteors.push({
        x: Math.random() * canvas.width,
        y: -50,
        size: Math.random() * 40 + 30,
        speed: Math.random() * 3 + 2
    });
}

setInterval(() => {
    if(!gameEnded){
        createMeteor();
    }
}, 1000);

function drawShip(){
    ctx.fillStyle = "#ffe600";

    ctx.beginPath();
    ctx.moveTo(ship.x + ship.width/2, ship.y);
    ctx.lineTo(ship.x, ship.y + ship.height);
    ctx.lineTo(ship.x + ship.width, ship.y + ship.height);
    ctx.closePath();
    ctx.fill();
}

function drawBullets(){
    ctx.fillStyle = "red";

    bullets.forEach((bullet, index) => {
        bullet.y -= 10;

        ctx.fillRect(bullet.x, bullet.y, 6, 20);

        if(bullet.y < 0){
            bullets.splice(index,1);
        }
    });
}

function drawMeteors(){
    ctx.fillStyle = "gray";

    meteors.forEach((meteor, meteorIndex) => {
        meteor.y += meteor.speed;

        ctx.beginPath();
        ctx.arc(meteor.x, meteor.y, meteor.size, 0, Math.PI * 2);
        ctx.fill();

        if(
            meteor.y + meteor.size > ship.y &&
            meteor.x > ship.x &&
            meteor.x < ship.x + ship.width
        ){
            endGame();
        }

        bullets.forEach((bullet, bulletIndex) => {

            const dx = bullet.x - meteor.x;
            const dy = bullet.y - meteor.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if(distance < meteor.size){

                meteors.splice(meteorIndex,1);
                bullets.splice(bulletIndex,1);

                score++;
                document.getElementById("score").innerText = "Score: " + score;

                boomSound.currentTime = 0;
                boomSound.play();
            }
        });

        if(meteor.y > canvas.height + 100){
            meteors.splice(meteorIndex,1);
        }
    });
}

function drawStars(){
    for(let i=0;i<100;i++){
        ctx.fillStyle = "white";
        ctx.fillRect(
            Math.random() * canvas.width,
            Math.random() * canvas.height,
            2,
            2
        );
    }
}

function endGame(){
    gameEnded = true;
    document.getElementById("gameOver").style.display = "block";
}

document.getElementById("restartBtn").addEventListener("click", () => {
    location.reload();
});

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawStars();
    drawShip();
    drawBullets();
    drawMeteors();

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
